<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira Aula</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSK-pU5mpJMdftt_QrO4FBS2ITMW5PP-a1XOQ&s">

<body>
    <h1>Acessar o Sistema</h1>
    <form>
        <div>
            <label for="campo-email">Email:</label>
            <input type="email" id="campo-email" placeholder="Ex: nome@email.com">
        </div>

        <div>
            <label for="campo-senha">Senha</label>
            <input type="password" id="campo-senha">

        <button type="submit">Entrar</button>
    </form>
    <hr> <p>
        <a href="#">Esqueci minha senha</a>
