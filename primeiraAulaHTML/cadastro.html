<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Login</title>
</head>
<body>
    <h1>Página de cadastro</h1>
    <form>
        <div>
            <label for="campo-nome">Informe seu Nome:</label>
            <input type="nome" id="campo-nome" >
        </div>

        <div>
            <label for="campo-sobrenome">Informe seu Sobrenome:</label>
            <input type="sobrenome" id="campo-sobrenome" >
        </div>

        <div>
            <label for="campo-email">Informe seu e-mail:</label>
            <input type="email" id="campo-email" placeholder="Ex: nome@email.com">
        </div>

        <div>
            <label for="campo-senha">Crie uma senha</label>
            <input type="password" id="campo-senha">
        </div>

        <div>
            <label for="campo-senha">Confirme sua senha</label>
            <input type="password" id="campo-senha">
        </div>

        <hr> <p>
        <a href="index.html">Enviar</a>
        </p>
        
    </form>
    
</body>
</html>
