<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container p-5">
    <main>
        <h1>Crachá Virtual</h1>
        <div class="container">
            <form>
                <div>
                    <label class="form-label">Digite seu nome:</label>
                    <input class="form-control p3" type="text" id="nome">
                </div>

                <div>
                    <label class="form-label">Digite sua idade:</label>
                    <input class="form-control p3" type="number" id="idade">
                </div>

                <div>
                    <label class="form-label">Digite seu cargo:</label>
                    <input class="form-control p3" type="text" id="cargo" placeholder="Desenvolvedor Júnior">
                </div>

                <div>
                    <label class="form-label">Informe seu departamento:</label>
                    <input class="form-control p3" type="text" id="departamento">
                </div>

                <div>
                    <input type="checkbox" id="acesso">
                    <label class="form-label">Tem acesso restrito?</label>
                </div>


            
                <button class="btn btn-primary" onclick="imprimirNome(), imprimiridade()">Enviar dados</button>
            </form>
            <!-- Comentário HTML-->
            <script src="formulario.js"></script>

        </div>
    </main>
</body>

</html>
